<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>AR Fruit Ninja</title>
  <style>
    /* ── Reset & Base ───────────────────────────── */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
      font-family: 'Segoe UI', system-ui, sans-serif;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
    }

    /* ── Hidden video source for MediaPipe ──────── */
    #video {
      position: absolute;
      width: 1px; height: 1px;
      opacity: 0;
      pointer-events: none;
      top: 0; left: 0;
    }

    /* ── Game Canvas ────────────────────────────── */
    #gameCanvas {
      position: absolute;
      top: 0; left: 0;
      width: 100vw;
      height: 100vh;
      display: block;
      touch-action: none;
    }

    /* ── Overlay base ───────────────────────────── */
    .overlay {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 30;
      text-align: center;
      padding: 24px;
      pointer-events: auto;
    }

    /* Glass panel inside overlay */
    .panel {
      background: rgba(0, 8, 20, 0.82);
      border: 1px solid rgba(0, 230, 200, 0.3);
      border-radius: 24px;
      padding: 40px 36px 36px;
      max-width: 380px;
      width: 100%;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow:
        0 0 60px rgba(0, 230, 200, 0.12),
        inset 0 0 30px rgba(0, 230, 200, 0.04);
    }

    /* Title */
    .overlay h1 {
      font-size: clamp(26px, 8vw, 44px);
      font-weight: 900;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #fff;
      margin-bottom: 6px;
      text-shadow:
        0 0 12px rgba(0, 240, 200, 0.9),
        0 0 30px rgba(0, 200, 255, 0.5);
    }

    .overlay .subtitle {
      font-size: clamp(12px, 3.5vw, 15px);
      color: rgba(150, 255, 230, 0.75);
      letter-spacing: 1px;
      margin-bottom: 28px;
      line-height: 1.7;
    }

    /* Neon CTA button */
    .game-btn {
      position: relative;
      background: transparent;
      border: 2px solid #00e6c8;
      color: #00e6c8;
      font-size: clamp(15px, 4.5vw, 18px);
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      padding: 14px 44px;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.15s ease;
      box-shadow:
        0 0 14px rgba(0, 230, 200, 0.4),
        inset 0 0 14px rgba(0, 230, 200, 0.07);
      -webkit-tap-highlight-color: transparent;
      overflow: hidden;
    }
    .game-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(0, 230, 200, 0);
      transition: background 0.15s;
      border-radius: inherit;
    }
    .game-btn:active::after { background: rgba(0, 230, 200, 0.18); }
    .game-btn:active { transform: scale(0.95); }

    /* Score ring on game over */
    .score-display {
      font-size: clamp(32px, 10vw, 52px);
      font-weight: 900;
      color: #ffe066;
      text-shadow: 0 0 20px rgba(255, 220, 0, 0.7);
      margin: 16px 0 8px;
    }
    .score-label {
      font-size: clamp(11px, 3vw, 13px);
      color: rgba(255, 220, 0, 0.55);
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 28px;
    }
    .reason-text {
      font-size: clamp(14px, 4vw, 17px);
      color: #ff4466;
      margin-bottom: 8px;
      font-weight: 600;
    }

    /* Tips line */
    .tip-line {
      font-size: 11px;
      color: rgba(100, 180, 160, 0.5);
      letter-spacing: 0.5px;
      margin-top: 20px;
      line-height: 1.6;
    }

    /* Status bar (loading) */
    #statusBar {
      position: absolute;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(0, 230, 200, 0.65);
      font-size: 13px;
      letter-spacing: 1px;
      z-index: 40;
      pointer-events: none;
      display: none;
    }

    /* Scanline overlay (aesthetic, very subtle) */
    #scanlines {
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 3px,
        rgba(0,0,0,0.03) 3px,
        rgba(0,0,0,0.03) 4px
      );
      pointer-events: none;
      z-index: 5;
    }
  </style>
</head>
<body>

<!-- Hidden video element (MediaPipe reads from this) -->
<video id="video" playsinline autoplay muted></video>

<!-- Main rendering surface -->
<canvas id="gameCanvas"></canvas>

<!-- Aesthetic scanlines -->
<div id="scanlines"></div>

<!-- ── Start Screen ──────────────────────────── -->
<div id="startScreen" class="overlay">
  <div class="panel">
    <h1>🍉 Fruit<br>Ninja AR</h1>
    <p class="subtitle">
      Raise your hand &amp; slice fruits<br>
      with your <strong style="color:#00e6c8">index finger</strong>.<br>
      Dodge the 💣 bombs!
    </p>
    <button class="game-btn" id="startBtn">▶ &nbsp;START</button>
    <p class="tip-line">Camera permission required.<br>Works best in bright light.</p>
  </div>
</div>

<!-- ── Game Over Screen ──────────────────────── -->
<div id="gameOverScreen" class="overlay" style="display:none">
  <div class="panel">
    <h1>💥 Game Over</h1>
    <p class="reason-text" id="gameOverReason">You sliced a bomb!</p>
    <div class="score-display" id="finalScoreNum">0</div>
    <div class="score-label">points</div>
    <button class="game-btn" id="restartBtn">↺ &nbsp;RETRY</button>
    <p class="tip-line">Keep your hand well-lit for best tracking.</p>
  </div>
</div>

<!-- Status / loading -->
<div id="statusBar">⏳ Starting camera…</div>

<!-- ── MediaPipe CDN ──────────────────────────── -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>

<script>
// ================================================================
//  AR FRUIT NINJA
//  - Live mirrored webcam background
//  - MediaPipe Hands (frame-skipped for mobile perf)
//  - Index-finger slice detection with trail
//  - Fruit + bomb gameplay
// ================================================================

'use strict';

/* ── DOM refs ─────────────────────────────────────────────── */
const canvas        = document.getElementById('gameCanvas');
const ctx           = canvas.getContext('2d');
const video         = document.getElementById('video');
const startScreen   = document.getElementById('startScreen');
const gameOverScreen = document.getElementById('gameOverScreen');
const statusBar     = document.getElementById('statusBar');

/* ── Canvas sizing ────────────────────────────────────────── */
function resizeCanvas() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', () => { resizeCanvas(); });

/* ── Game state ───────────────────────────────────────────── */
let gameState = 'idle';    // 'idle' | 'playing' | 'gameover'
let score     = 0;
let fruits    = [];
let bombs     = [];
let particles = [];
let splashTexts = [];       // "+10" floating text
let sliceTrail  = [];       // ring buffer of finger positions
let lastFruitTime = 0;
let lastBombTime  = 0;
const FRUIT_INTERVAL = 1050; // ms between fruit spawns
const BOMB_INTERVAL  = 3200;

/* ── Finger tracking ──────────────────────────────────────── */
let rawFinger    = { x: -300, y: -300, visible: false };
let smoothFinger = { x: -300, y: -300 };
let prevFinger   = { x: -300, y: -300 };
let handLandmarks = null;
const LERP = 0.38;   // interpolation factor (lower = smoother, higher = snappier)

/* ── Fruit catalogue ──────────────────────────────────────── */
const FRUIT_DATA = [
  { emoji:'🍎', color:'#ff3333', glow:'#ff7777', r:32 },
  { emoji:'🍊', color:'#ff8800', glow:'#ffaa44', r:30 },
  { emoji:'🍋', color:'#ffe800', glow:'#ffff66', r:28 },
  { emoji:'🍇', color:'#aa33ff', glow:'#cc88ff', r:28 },
  { emoji:'🍉', color:'#33cc44', glow:'#66ff77', r:36 },
  { emoji:'🍓', color:'#ff1166', glow:'#ff5588', r:26 },
  { emoji:'🍑', color:'#ff9966', glow:'#ffcc99', r:28 },
  { emoji:'🥭', color:'#ff9900', glow:'#ffcc44', r:31 },
  { emoji:'🍌', color:'#ffdd00', glow:'#ffee55', r:30 },
  { emoji:'🍒', color:'#cc0022', glow:'#ff3355', r:25 },
];

/* ── Rounded rect helper (Safari < 15.4 compat) ──────────── */
function rrect(cx, cy, w, h, r) {
  cx -= w / 2; cy -= h / 2;
  ctx.beginPath();
  ctx.moveTo(cx + r, cy);
  ctx.lineTo(cx + w - r, cy);
  ctx.quadraticCurveTo(cx + w, cy,     cx + w, cy + r);
  ctx.lineTo(cx + w, cy + h - r);
  ctx.quadraticCurveTo(cx + w, cy + h, cx + w - r, cy + h);
  ctx.lineTo(cx + r, cy + h);
  ctx.quadraticCurveTo(cx,     cy + h, cx,     cy + h - r);
  ctx.lineTo(cx, cy + r);
  ctx.quadraticCurveTo(cx,     cy,     cx + r, cy);
  ctx.closePath();
}

/* ── Spawn helpers ────────────────────────────────────────── */
function spawnFruit() {
  const d = FRUIT_DATA[Math.floor(Math.random() * FRUIT_DATA.length)];
  const r = d.r;
  fruits.push({
    x:        r + Math.random() * (canvas.width - r * 2),
    y:        -r - 10,
    vx:       (Math.random() - 0.5) * 3.5,
    vy:       1.6 + Math.random() * 2.4,
    rot:      Math.random() * Math.PI * 2,
    rspd:     (Math.random() - 0.5) * 0.11,
    r,
    emoji: d.emoji, color: d.color, glow: d.glow,
    sliced: false,
  });
}

function spawnBomb() {
  bombs.push({
    x:     40 + Math.random() * (canvas.width - 80),
    y:     -40,
    vx:    (Math.random() - 0.5) * 2.8,
    vy:    1.6 + Math.random() * 2,
    rot:   0,
    rspd:  (Math.random() - 0.5) * 0.08,
    r:     28,
    pulse: Math.random() * Math.PI * 2,
    sliced: false,
  });
}

/* ── Particle burst on slice ─────────────────────────────── */
function burst(x, y, color) {
  for (let i = 0; i < 10; i++) {
    const a = (Math.PI * 2 / 10) * i + Math.random() * 0.6;
    const s = 2.5 + Math.random() * 4.5;
    particles.push({
      x, y,
      vx: Math.cos(a) * s,
      vy: Math.sin(a) * s - 1,
      alpha: 1,
      color,
      r: 2.5 + Math.random() * 3.5,
    });
  }
}

/* ── Floating score text ─────────────────────────────────── */
function addSplash(x, y, text) {
  splashTexts.push({ x, y, vy: -1.8, alpha: 1, text });
}

/* ── Slice detection ─────────────────────────────────────── */
function checkSlice(obj) {
  if (!rawFinger.visible) return false;
  // Must have meaningful velocity
  const dx = smoothFinger.x - prevFinger.x;
  const dy = smoothFinger.y - prevFinger.y;
  if (dx * dx + dy * dy < 36) return false;          // speed < 6px
  const cx = smoothFinger.x - obj.x;
  const cy = smoothFinger.y - obj.y;
  return (cx * cx + cy * cy) < (obj.r + 14) * (obj.r + 14); // generous radius
}

/* ── Game-over trigger ───────────────────────────────────── */
function triggerGameOver(reason) {
  gameState = 'gameover';
  document.getElementById('finalScoreNum').textContent = score;
  document.getElementById('gameOverReason').textContent = reason;
  gameOverScreen.style.display = 'flex';
}

/* ── UPDATE (called each frame while playing) ─────────────── */
function update(ts) {
  // Smooth index-finger position
  if (rawFinger.visible) {
    smoothFinger.x += (rawFinger.x - smoothFinger.x) * LERP;
    smoothFinger.y += (rawFinger.y - smoothFinger.y) * LERP;
    // Update trail
    sliceTrail.push({ x: smoothFinger.x, y: smoothFinger.y, t: ts });
  }
  // Expire trail older than 220ms
  while (sliceTrail.length && ts - sliceTrail[0].t > 220) sliceTrail.shift();

  // ── Spawning ────────────────────────────────────────
  if (ts - lastFruitTime > FRUIT_INTERVAL) {
    spawnFruit();
    if (Math.random() < 0.28) spawnFruit();  // occasional double
    lastFruitTime = ts;
  }
  if (score >= 50 && ts - lastBombTime > BOMB_INTERVAL) {
    spawnBomb();
    lastBombTime = ts;
  }

  // ── Fruits ──────────────────────────────────────────
  const GRAVITY = 0.055;
  for (let i = fruits.length - 1; i >= 0; i--) {
    const f = fruits[i];
    f.vy  += GRAVITY;
    f.x   += f.vx;
    f.y   += f.vy;
    f.rot += f.rspd;

    if (!f.sliced && checkSlice(f)) {
      f.sliced = true;
      score   += 10;
      burst(f.x, f.y, f.glow);
      addSplash(f.x, f.y - f.r - 8, '+10');
    }
    if (f.y > canvas.height + 80 || f.sliced) {
      fruits.splice(i, 1);
    }
  }

  // ── Bombs ────────────────────────────────────────────
  for (let i = bombs.length - 1; i >= 0; i--) {
    const b = bombs[i];
    b.vy    += GRAVITY;
    b.x     += b.vx;
    b.y     += b.vy;
    b.rot   += b.rspd;
    b.pulse += 0.12;

    if (!b.sliced && checkSlice(b)) {
      b.sliced = true;
      burst(b.x, b.y, '#ff2244');
      triggerGameOver('💣 You sliced a bomb!');
      return;
    }
    if (b.y > canvas.height + 80 || b.sliced) {
      bombs.splice(i, 1);
    }
  }

  // ── Particles ────────────────────────────────────────
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x    += p.vx;
    p.y    += p.vy;
    p.vy   += 0.12;
    p.alpha -= 0.038;
    if (p.alpha <= 0) particles.splice(i, 1);
  }

  // ── Splash texts ─────────────────────────────────────
  for (let i = splashTexts.length - 1; i >= 0; i--) {
    const s = splashTexts[i];
    s.y    += s.vy;
    s.vy   *= 0.94;
    s.alpha -= 0.025;
    if (s.alpha <= 0) splashTexts.splice(i, 1);
  }

  prevFinger = { x: smoothFinger.x, y: smoothFinger.y };
}

/* ── DRAW: Background (mirrored webcam) ───────────────────── */
function drawBackground() {
  if (video.readyState >= 2) {
    ctx.save();
    ctx.translate(canvas.width, 0);
    ctx.scale(-1, 1);
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    ctx.restore();
  } else {
    // Fallback gradient until camera ready
    const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
    grad.addColorStop(0,   '#020818');
    grad.addColorStop(1,   '#000d14');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  }
  // Subtle dark vignette overlay for readability
  ctx.fillStyle = 'rgba(0,2,8,0.22)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
}

/* ── DRAW: Slice trail ────────────────────────────────────── */
function drawTrail() {
  const n = sliceTrail.length;
  if (n < 2) return;
  ctx.save();
  ctx.lineCap  = 'round';
  ctx.lineJoin = 'round';
  for (let i = 1; i < n; i++) {
    const t  = i / n;
    const tt = t * t;           // ease
    ctx.beginPath();
    ctx.moveTo(sliceTrail[i - 1].x, sliceTrail[i - 1].y);
    ctx.lineTo(sliceTrail[i].x,     sliceTrail[i].y);
    ctx.strokeStyle  = `rgba(0,230,255,${tt * 0.85})`;
    ctx.lineWidth    = tt * 6;
    ctx.shadowColor  = '#00e6ff';
    ctx.shadowBlur   = 14;
    ctx.stroke();
  }
  ctx.restore();
}

/* ── DRAW: Fruits ─────────────────────────────────────────── */
function drawFruit(f) {
  ctx.save();
  ctx.translate(f.x, f.y);
  ctx.rotate(f.rot);

  // Glow halo
  ctx.shadowColor = f.glow;
  ctx.shadowBlur  = 20;
  ctx.beginPath();
  ctx.arc(0, 0, f.r, 0, Math.PI * 2);
  ctx.fillStyle   = f.color + '44';
  ctx.fill();
  ctx.strokeStyle = f.color;
  ctx.lineWidth   = 2.5;
  ctx.stroke();

  // Emoji
  ctx.shadowBlur = 0;
  ctx.font = `${Math.round(f.r * 1.3)}px Arial`;
  ctx.textAlign    = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(f.emoji, 0, 1);
  ctx.restore();
}

/* ── DRAW: Bombs ──────────────────────────────────────────── */
function drawBomb(b) {
  const pulseMag = Math.sin(b.pulse) * 5;
  ctx.save();
  ctx.translate(b.x, b.y);
  ctx.rotate(b.rot);

  ctx.shadowColor = '#ff1133';
  ctx.shadowBlur  = 22 + Math.abs(pulseMag) * 2;

  // Outer ring pulse
  ctx.beginPath();
  ctx.arc(0, 0, b.r + 4 + pulseMag, 0, Math.PI * 2);
  ctx.strokeStyle = `rgba(255,30,50,${0.35 + 0.25 * Math.abs(Math.sin(b.pulse))})`;
  ctx.lineWidth   = 2;
  ctx.stroke();

  // Main body
  ctx.beginPath();
  ctx.arc(0, 0, b.r, 0, Math.PI * 2);
  ctx.fillStyle   = '#110005';
  ctx.fill();
  ctx.strokeStyle = '#ff1133';
  ctx.lineWidth   = 3;
  ctx.stroke();

  // Emoji
  ctx.shadowBlur = 0;
  ctx.font = `${Math.round(b.r * 1.35)}px Arial`;
  ctx.textAlign    = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('💣', 0, 1);
  ctx.restore();
}

/* ── DRAW: Particles ─────────────────────────────────────── */
function drawParticles() {
  ctx.save();
  for (const p of particles) {
    const hex = Math.round(p.alpha * 255).toString(16).padStart(2, '0');
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fillStyle  = p.color + hex;
    ctx.shadowColor = p.color;
    ctx.shadowBlur  = 7;
    ctx.fill();
  }
  ctx.restore();
}

/* ── DRAW: Splash "+10" texts ─────────────────────────────── */
function drawSplash() {
  ctx.save();
  ctx.font         = 'bold 22px Arial';
  ctx.textAlign    = 'center';
  ctx.textBaseline = 'middle';
  for (const s of splashTexts) {
    const hex = Math.round(s.alpha * 255).toString(16).padStart(2, '0');
    ctx.fillStyle  = '#ffe055' + hex;
    ctx.shadowColor = '#ffcc00';
    ctx.shadowBlur  = 14;
    ctx.fillText(s.text, s.x, s.y);
  }
  ctx.restore();
}

/* ── DRAW: Hand skeleton & landmarks ─────────────────────── */
const CONNECTIONS = [
  [0,1],[1,2],[2,3],[3,4],
  [0,5],[5,6],[6,7],[7,8],
  [5,9],[9,10],[10,11],[11,12],
  [9,13],[13,14],[14,15],[15,16],
  [13,17],[17,18],[18,19],[19,20],
  [0,17],
];
const FINGERTIPS = new Set([4, 8, 12, 16, 20]);

// Convert normalised MediaPipe coords → mirrored canvas coords
function lmToScreen(lm) {
  return {
    x: canvas.width  - lm.x * canvas.width,   // horizontal mirror
    y:                 lm.y * canvas.height,
  };
}

function drawHand() {
  if (!handLandmarks) return;
  const lm = handLandmarks;
  ctx.save();

  // Skeleton lines
  ctx.lineWidth    = 1.6;
  ctx.strokeStyle  = 'rgba(0,255,120,0.45)';
  ctx.shadowColor  = '#00ff88';
  ctx.shadowBlur   = 6;
  for (const [a, b] of CONNECTIONS) {
    const pa = lmToScreen(lm[a]);
    const pb = lmToScreen(lm[b]);
    ctx.beginPath();
    ctx.moveTo(pa.x, pa.y);
    ctx.lineTo(pb.x, pb.y);
    ctx.stroke();
  }

  // Landmark dots
  for (let i = 0; i < lm.length; i++) {
    const { x, y } = lmToScreen(lm[i]);
    const isIndex = (i === 8);

    if (isIndex) {
      // Large glowing cyan disc for index tip
      ctx.beginPath();
      ctx.arc(x, y, 16, 0, Math.PI * 2);
      ctx.fillStyle   = 'rgba(0,210,255,0.18)';
      ctx.shadowColor = '#00d2ff';
      ctx.shadowBlur  = 30;
      ctx.fill();

      ctx.beginPath();
      ctx.arc(x, y, 8, 0, Math.PI * 2);
      ctx.fillStyle   = '#00d2ff';
      ctx.shadowBlur  = 22;
      ctx.fill();

      // White core
      ctx.beginPath();
      ctx.arc(x, y, 3, 0, Math.PI * 2);
      ctx.fillStyle  = '#ffffff';
      ctx.shadowBlur = 0;
      ctx.fill();

    } else if (FINGERTIPS.has(i)) {
      ctx.beginPath();
      ctx.arc(x, y, 5, 0, Math.PI * 2);
      ctx.fillStyle   = '#00ff88';
      ctx.shadowColor = '#00ff88';
      ctx.shadowBlur  = 10;
      ctx.fill();

    } else {
      ctx.beginPath();
      ctx.arc(x, y, 3, 0, Math.PI * 2);
      ctx.fillStyle   = '#55ffaa';
      ctx.shadowColor = '#55ffaa';
      ctx.shadowBlur  = 5;
      ctx.fill();
    }
  }
  ctx.restore();
}

/* ── DRAW: HUD (score + bomb warning) ────────────────────── */
function drawHUD() {
  ctx.save();

  // Score pill
  ctx.fillStyle = 'rgba(0,4,12,0.60)';
  rrect(80, 28, 140, 44, 14);
  ctx.fill();
  ctx.strokeStyle = 'rgba(0,230,200,0.25)';
  ctx.lineWidth   = 1;
  rrect(80, 28, 140, 44, 14);
  ctx.stroke();

  ctx.font         = 'bold 20px Arial';
  ctx.fillStyle    = '#00e6c8';
  ctx.shadowColor  = '#00e6c8';
  ctx.shadowBlur   = 10;
  ctx.textAlign    = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(`⚡ ${score}`, 80, 28);

  // Bomb warning ribbon
  if (score >= 50) {
    const pulse = 0.55 + 0.45 * Math.sin(Date.now() / 350);
    ctx.font      = 'bold 12px Arial';
    ctx.fillStyle = `rgba(255,50,70,${pulse})`;
    ctx.shadowColor = '#ff2244';
    ctx.shadowBlur  = 8;
    ctx.textAlign   = 'center';
    ctx.fillText('⚠ BOMBS ACTIVE', canvas.width / 2, 18);
  }

  ctx.restore();
}

/* ── MAIN LOOP ────────────────────────────────────────────── */
function gameLoop(ts) {
  // 1. Always render webcam background (never a black screen)
  drawBackground();

  // 2. Game objects
  if (gameState === 'playing') {
    update(ts);
    for (const f of fruits) drawFruit(f);
    for (const b of bombs)  drawBomb(b);
    drawParticles();
    drawSplash();
    drawTrail();
    drawHUD();
  }

  // 3. Hand skeleton — visible in all states when camera is running
  drawHand();

  requestAnimationFrame(gameLoop);
}

/* ── MediaPipe Hands init ─────────────────────────────────── */
let mpTick = 0;

function initMediaPipe() {
  const hands = new Hands({
    locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`
  });

  hands.setOptions({
    maxNumHands:            1,
    modelComplexity:        0,   // 0 = Lite (fastest)
    minDetectionConfidence: 0.5,
    minTrackingConfidence:  0.5,
  });

  hands.onResults(results => {
    if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
      handLandmarks = results.multiHandLandmarks[0];
      const tip = handLandmarks[8];
      rawFinger.x       = canvas.width - tip.x * canvas.width;
      rawFinger.y       = tip.y * canvas.height;
      rawFinger.visible = true;
    } else {
      handLandmarks     = null;
      rawFinger.visible = false;
    }
  });

  const cam = new Camera(video, {
    onFrame: async () => {
      mpTick++;
      // Send every 2nd frame to MediaPipe → ~15fps tracking, 60fps render
      if (mpTick % 2 === 0) await hands.send({ image: video });
    },
    width:  640,
    height: 480,
  });

  cam.start()
    .then(() => { statusBar.style.display = 'none'; })
    .catch(() => {
      statusBar.textContent = '❌ Camera access denied';
      statusBar.style.display = 'block';
    });
}

/* ── Game control ─────────────────────────────────────────── */
function resetGame() {
  score         = 0;
  fruits        = [];
  bombs         = [];
  particles     = [];
  splashTexts   = [];
  sliceTrail    = [];
  lastFruitTime = performance.now() - FRUIT_INTERVAL + 600; // slight delay on start
  lastBombTime  = 0;
  prevFinger    = { x: smoothFinger.x, y: smoothFinger.y };
  gameState     = 'playing';
}

/* ── Button events ────────────────────────────────────────── */
document.getElementById('startBtn').addEventListener('click', () => {
  statusBar.textContent   = '⏳ Starting camera…';
  statusBar.style.display = 'block';
  startScreen.style.display = 'none';

  initMediaPipe();
  resetGame();
  requestAnimationFrame(gameLoop);   // kick off the render loop once
});

document.getElementById('restartBtn').addEventListener('click', () => {
  gameOverScreen.style.display = 'none';
  resetGame();
  // Loop is already running — state change is enough
});
</script>
